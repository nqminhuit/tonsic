<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Tonsic — Chord Trainer (Static)</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Tonsic — Chord Trainer (Static)</h1>
  <div id="controls">
    <button id="connectBtn">Connect MIDI</button>
    <button id="newChordBtn">New chord</button>
    <span id="status">Not connected</span>

  <div id="target">Target: (press New chord)</div>
  <div id="keyboard" class="keyboard"></div>
  <div id="result" class="scorecard"></div>
  <script src="app.js"></script>
</body>
</html>
